{% extends "base.html" %}
{% block content %}
<div style="max-width: 500px; margin: 80px auto; padding: 4rem; background: var(--white); border: 1px solid var(--cream); text-align: center;">
    <h1 class="syne" style="font-size: 32px; margin-bottom: 0.5rem; color: var(--ink);">Bienvenido de vuelta</h1>
    <p class="mono" style="color: var(--warm-mid); margin-bottom: 3rem;">Ingresa para gestionar tus Refills</p>
    
    {% if error %}
    <div style="background: #fdeaea; color: #d32f2f; padding: 1rem; margin-bottom: 1.5rem; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 12px;">{{ error }}</div>
    {% endif %}

    <form method="POST" style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div class="form-field" style="text-align: left;">
            <label class="form-label mono" style="font-size: 10px;">Correo Electrónico</label>
            <input type="email" name="email" class="form-input" required>
        </div>
        <div class="form-field" style="text-align: left;">
            <label class="form-label mono" style="font-size: 10px;">Contraseña</label>
            <input type="password" name="password" class="form-input" required>
        </div>
        <button type="submit" class="hero-cta mono" style="width: 100%; justify-content: center; border: none; cursor: pointer; margin-top: 1rem;">Entrar al Ciclo</button>
    </form>
    
    <div style="margin-top: 3rem; border-top: 1px solid var(--cream); padding-top: 2rem;">
        <p class="mono" style="font-size: 12px; color: var(--warm-mid);">¿Aún no tienes cuenta?</p>
        <a href="{{ url_for('registro') }}" style="color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 700; text-decoration: none;">Crear un perfil ecológico</a>
    </div>
</div>
{% endblock %}
